<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 320" preserveAspectRatio="none">
  <defs>
    <filter id="grassNoise" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="11"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.52  0 0 0 0 0.18  0 0 0 0.35 0"/>
    </filter>
    <filter id="grassFibers" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="turbulence" baseFrequency="0.03 0.9" numOctaves="1" seed="5"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.78  0 0 0 0 0.32  0 0 0 0.22 0"/>
    </filter>
    <filter id="pitchCrack" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="17"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.47  0 0 0 0 0.39  0 0 0 0 0.28  0 0 0 0.35 0"/>
    </filter>
    <linearGradient id="fieldBase" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#3f8d2d"/>
      <stop offset="50%" stop-color="#58a53c"/>
      <stop offset="100%" stop-color="#3f8d2d"/>
    </linearGradient>
    <linearGradient id="pitchBase" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b8a186"/>
      <stop offset="50%" stop-color="#c4ae92"/>
      <stop offset="100%" stop-color="#b8a186"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="320" fill="url(#fieldBase)"/>
  <rect width="1600" height="320" filter="url(#grassNoise)"/>
  <rect width="1600" height="320" filter="url(#grassFibers)" opacity="0.9"/>

  <rect x="220" y="88" width="1160" height="144" rx="2" fill="url(#pitchBase)"/>
  <rect x="220" y="88" width="1160" height="144" filter="url(#pitchCrack)"/>

  <line x1="220" y1="88" x2="220" y2="232" stroke="rgba(255,255,255,0.52)" stroke-width="2"/>
  <line x1="1380" y1="88" x2="1380" y2="232" stroke="rgba(255,255,255,0.52)" stroke-width="2"/>

  <line x1="280" y1="72" x2="280" y2="248" stroke="rgba(255,255,255,0.72)" stroke-width="2"/>
  <line x1="1320" y1="72" x2="1320" y2="248" stroke="rgba(255,255,255,0.72)" stroke-width="2"/>

  <line x1="20" y1="88" x2="220" y2="88" stroke="rgba(255,255,255,0.26)" stroke-width="3"/>
  <line x1="20" y1="232" x2="220" y2="232" stroke="rgba(255,255,255,0.26)" stroke-width="3"/>
  <line x1="1380" y1="88" x2="1580" y2="88" stroke="rgba(255,255,255,0.26)" stroke-width="3"/>
  <line x1="1380" y1="232" x2="1580" y2="232" stroke="rgba(255,255,255,0.26)" stroke-width="3"/>
</svg>
